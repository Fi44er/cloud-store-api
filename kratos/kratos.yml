version: v1.1.0

dsn: postgres://kratos:root@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000 # React
        - http://localhost:3001 # Go Fiber
      allowed_methods: [POST, GET, PUT, PATCH, DELETE]
      allowed_headers: [Authorization, Cookie, Content-Type]
      exposed_headers: [Content-Type, Set-Cookie]
      allow_credentials: true
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://localhost:3000/
  allowed_return_urls:
    - http://localhost:3000

  methods:
    password:
      enabled: true
      config:
        # ОТКЛЮЧЕНО: Проверка по базе утечек (только для разработки!)
        haveibeenpwned_enabled: false
        min_password_length: 6
    code:
      enabled: true
      config:
        lifespan: 15m

  flows:
    registration:
      enabled: true
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
            # УБРАНО: show_verification_ui (мешает Native Flow)

    verification:
      enabled: true
      use: code
      ui_url: http://localhost:3000/verification

    login:
      ui_url: http://localhost:3000/login

log:
  level: debug # Полезно видеть всё в консоли при разработке

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE-32
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL # РОВНО 32 СИМВОЛА!

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://mailpit:1025/?skip_ssl_verify=true&disable_starttls=true
    from_address: noreply@example.com
